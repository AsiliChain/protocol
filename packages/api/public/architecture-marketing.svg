  </g>
  <line x1="310" y1="300" x2="310" y2="260" stroke="#C8922A" stroke-width="1.5" opacity="0.6"/>
  <line x1="640" y1="300" x2="640" y2="260" stroke="#C8922A" stroke-width="1.5" opacity="0.6"/>

  <!-- Risk Monitor -->
  <g transform="translate(140, 305)">
    <rect x="0" y="0" width="320" height="85" rx="14" fill="oklch(99% 0.008 85)" stroke="oklch(82% 0.02 90)" stroke-width="2"/>
    <rect x="12" y="12" width="56" height="18" rx="6" fill="#C8922A" fill-opacity="0.15" stroke="#C8922A" stroke-width="0.5"/>
    <text x="40" y="25" text-anchor="middle" class="ai-badge" fill="#C8922A">ERC-8004</text>
    <text x="78" y="26" class="ai-card-title" fill="#1A3557">Risk Monitor</text>
    <text x="15" y="48" class="ai-card-desc">Monitors loan health across LendingVault</text>
    <text x="15" y="64" class="ai-card-desc">Alerts on LTV threshold breaches</text>
    <circle cx="160" cy="42" r="4" fill="#C8922A" opacity="0.4"/>
  </g>

  <!-- Anomaly Detector -->
  <g transform="translate(500, 305)">
    <rect x="0" y="0" width="330" height="85" rx="14" fill="oklch(99% 0.008 85)" stroke="oklch(82% 0.02 90)" stroke-width="2"/>
    <rect x="12" y="12" width="56" height="18" rx="6" fill="#C8922A" fill-opacity="0.15" stroke="#C8922A" stroke-width="0.5"/>
    <text x="40" y="25" text-anchor="middle" class="ai-badge" fill="#C8922A">ERC-8004</text>
    <text x="78" y="26" class="ai-card-title" fill="#1A3557">Anomaly Detector</text>
    <text x="15" y="48" class="ai-card-desc">Scans supply chain for irregularities</text>
    <text x="15" y="64" class="ai-card-desc">Flags missing POs, grade gaps, stale exports</text>
    <circle cx="165" cy="42" r="4" fill="#C8922A" opacity="0.4"/>
