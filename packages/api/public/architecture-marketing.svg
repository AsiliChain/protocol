  <g transform="translate(485, 125)"><line x1="0" y1="0" x2="40" y2="0" stroke="#C8922A" stroke-width="2.5"/><polygon points="37,-4 44,0 37,4" fill="#C8922A"/></g>

  <!-- Column 3: Hedera HCS -->
  <g transform="translate(530, 30)">
    <rect x="0" y="0" width="200" height="190" rx="16" fill="oklch(98% 0.005 260)" stroke="oklch(72% 0.02 260)" stroke-width="2"/>
    <!-- Hedera logo: official H symbol -->
    <g transform="translate(60, 20)">
      <circle cx="40" cy="40" r="40" fill="#000000"/>
      <rect x="18" y="22" width="14" height="36" rx="3" fill="#FFFFFF"/>
      <rect x="48" y="22" width="14" height="36" rx="3" fill="#FFFFFF"/>
      <rect x="26" y="34" width="28" height="6" rx="2" fill="#FFFFFF"/>
    </g>
    <text x="100" y="135" text-anchor="middle" class="col-title" fill="#1A3557">Hedera HCS</text>
    <text x="100" y="153" text-anchor="middle" class="col-tagline">Immutable audit trail</text>
  </g>

  <g transform="translate(730, 125)"><line x1="0" y1="0" x2="40" y2="0" stroke="#C8922A" stroke-width="2.5"/><polygon points="37,-4 44,0 37,4" fill="#C8922A"/></g>

  <!-- Column 4: Mobile Money -->
  <g transform="translate(775, 30)">
    <rect x="0" y="0" width="200" height="190" rx="16" fill="oklch(98% 0.005 90)" stroke="oklch(72% 0.02 90)" stroke-width="2"/>
    <g transform="translate(72, 32)">
      <rect x="6" y="0" width="20" height="36" rx="5" stroke="#2D6A2D" stroke-width="3" fill="none"/>
      <line x1="16" y1="32" x2="16" y2="36" stroke="#2D6A2D" stroke-width="2.5"/>
      <text x="36" y="27" font-size="13" font-weight="800" fill="#2D6A2D" font-family="sans-serif">*384#</text>
    </g>
    <text x="100" y="135" text-anchor="middle" class="col-title" fill="#2D6A2D">Mobile Money</text>
    <text x="100" y="153" text-anchor="middle" class="col-tagline">Farmer payout in &lt;60s</text>
  </g>

  <!-- AI Layer -->
  <line x1="30" y1="260" x2="970" y2="260" stroke="#C8922A" stroke-width="2" stroke-dasharray="6 5" opacity="0.5"/>
  <g transform="translate(40, 252)">
