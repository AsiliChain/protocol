<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .col-title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .col-tagline { font-size: 10px; fill: #6b7280; }
    .ai-title { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .ai-card-title { font-size: 11px; font-weight: 600; }
    .ai-card-desc { font-size: 9px; fill: #6b7280; }
    .ai-badge { font-size: 7px; font-weight: 600; }
  </style>

  <!-- Column 1: Ethereum -->
  <g transform="translate(40, 30)">
    <rect x="0" y="0" width="190" height="180" rx="16" fill="oklch(98% 0.005 260)" stroke="oklch(88% 0.02 260)" stroke-width="1"/>
    <!-- Ethereum diamond logo -->
    <g transform="translate(77, 30)">
      <polygon points="18,0 36,18 18,36 0,18" fill="#627EEA"/>
      <polygon points="18,4 30,18 18,26 6,18" fill="#fff" opacity="0.8"/>
      <polygon points="18,26 30,18 18,22 6,18" fill="#fff" opacity="0.35"/>
    </g>
    <text x="95" y="100" text-anchor="middle" class="col-title" fill="#1A3557">Ethereum</text>
    <text x="95" y="118" text-anchor="middle" class="col-tagline">Proof-of-Stake security</text>
  </g>

  <!-- Connector -->
  <g transform="translate(230, 120)"><line x1="0" y1="0" x2="36" y2="0" stroke="#C8922A" stroke-width="1.5"/><polygon points="34,-3 40,0 34,3" fill="#C8922A"/></g>

  <!-- Column 2: Mantle -->
  <g transform="translate(274, 30)">
    <rect x="0" y="0" width="190" height="180" rx="16" fill="oklch(98% 0.005 90)" stroke="oklch(88% 0.02 90)" stroke-width="1"/>
    <!-- Mantle M -->
    <g transform="translate(77, 30)">
      <rect x="2" y="2" width="32" height="32" rx="7" fill="#000"/>
      <text x="18" y="26" text-anchor="middle" font-size="19" font-weight="800" fill="#fff" font-family="sans-serif">M</text>
    </g>
    <text x="95" y="100" text-anchor="middle" class="col-title" fill="#2D6A2D">Mantle</text>
    <text x="95" y="118" text-anchor="middle" class="col-tagline">Low-cost gasless txs</text>
    <!-- Smart contracts -->
    <rect x="30" y="132" width="130" height="36" rx="8" fill="oklch(97% 0.008 85)" stroke="#C8922A" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="95" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#4B2E0A">Smart Contracts</text>
    <text x="95" y="161" text-anchor="middle" font-size="8" fill="#6b7280">7 modules</text>
  </g>

  <g transform="translate(464, 120)"><line x1="0" y1="0" x2="36" y2="0" stroke="#C8922A" stroke-width="1.5"/><polygon points="34,-3 40,0 34,3" fill="#C8922A"/></g>

  <!-- Column 3: Hedera HCS -->
  <g transform="translate(508, 30)">
    <rect x="0" y="0" width="190" height="180" rx="16" fill="oklch(98% 0.005 260)" stroke="oklch(88% 0.02 260)" stroke-width="1"/>
    <!-- Hedera H -->
    <g transform="translate(74, 30)">
      <circle cx="21" cy="18" r="18" fill="#000"/>
      <rect x="10" y="10" width="8" height="16" rx="1.5" fill="#fff"/>
      <rect x="24" y="10" width="8" height="16" rx="1.5" fill="#fff"/>
      <rect x="14" y="15" width="14" height="3" rx="1" fill="#fff"/>
    </g>
    <text x="95" y="100" text-anchor="middle" class="col-title" fill="#1A3557">Hedera HCS</text>
    <text x="95" y="118" text-anchor="middle" class="col-tagline">Immutable audit trail</text>
  </g>

  <g transform="translate(698, 120)"><line x1="0" y1="0" x2="36" y2="0" stroke="#C8922A" stroke-width="1.5"/><polygon points="34,-3 40,0 34,3" fill="#C8922A"/></g>

  <!-- Column 4: Mobile Money -->
  <g transform="translate(742, 30)">
    <rect x="0" y="0" width="190" height="180" rx="16" fill="oklch(98% 0.005 90)" stroke="oklch(88% 0.02 90)" stroke-width="1"/>
    <g transform="translate(77, 30)">
      <rect x="12" y="2" width="12" height="22" rx="3" stroke="#2D6A2D" stroke-width="2" fill="none"/>
      <line x1="18" y1="20" x2="18" y2="22" stroke="#2D6A2D" stroke-width="1.5"/>
      <text x="28" y="16" font-size="14" font-weight="800" fill="#C8922A">*</text>
      <text x="28" y="28" font-size="7" font-weight="700" fill="#2D6A2D">384#</text>
    </g>
    <text x="95" y="100" text-anchor="middle" class="col-title" fill="#2D6A2D">Mobile Money</text>
    <text x="95" y="118" text-anchor="middle" class="col-tagline">Farmer payout in &lt;60s</text>
  </g>

  <!-- AI Layer -->
  <line x1="30" y1="250" x2="930" y2="250" stroke="#C8922A" stroke-width="1" stroke-dasharray="5 4" opacity="0.4"/>
  <g transform="translate(40, 244)">
    <rect x="0" y="0" width="200" height="20" rx="4" fill="oklch(99% 0.008 85)"/>
    <text x="100" y="13" text-anchor="middle" class="ai-title" fill="#C8922A">⚡ AI Intelligence Layer</text>
  </g>
  <line x1="310" y1="280" x2="310" y2="250" stroke="#C8922A" stroke-width="1" opacity="0.5"/>
  <line x1="620" y1="280" x2="620" y2="250" stroke="#C8922A" stroke-width="1" opacity="0.5"/>

  <!-- Risk Monitor -->
  <g transform="translate(170, 280)">
    <rect x="0" y="0" width="280" height="70" rx="12" fill="oklch(99% 0.008 85)" stroke="oklch(88% 0.02 90)" stroke-width="1"/>
    <rect x="10" y="10" width="48" height="16" rx="6" fill="#C8922A" fill-opacity="0.15"/>
    <text x="34" y="21" text-anchor="middle" class="ai-badge" fill="#C8922A">ERC-8004</text>
    <text x="68" y="22" class="ai-card-title" fill="#1A3557">Risk Monitor</text>
    <text x="15" y="40" class="ai-card-desc">Monitors loan health across LendingVault</text>
    <text x="15" y="54" class="ai-card-desc">Alerts on LTV threshold breaches</text>
    <circle cx="140" cy="35" r="3" fill="#C8922A" opacity="0.5"/>
  </g>

  <!-- Anomaly Detector -->
  <g transform="translate(500, 280)">
    <rect x="0" y="0" width="290" height="70" rx="12" fill="oklch(99% 0.008 85)" stroke="oklch(88% 0.02 90)" stroke-width="1"/>
    <rect x="10" y="10" width="48" height="16" rx="6" fill="#C8922A" fill-opacity="0.15"/>
    <text x="34" y="21" text-anchor="middle" class="ai-badge" fill="#C8922A">ERC-8004</text>
    <text x="68" y="22" class="ai-card-title" fill="#1A3557">Anomaly Detector</text>
    <text x="15" y="40" class="ai-card-desc">Scans supply chain for irregularities</text>
    <text x="15" y="54" class="ai-card-desc">Flags missing POs, grade gaps, stale exports</text>
    <circle cx="145" cy="35" r="3" fill="#C8922A" opacity="0.5"/>
  </g>
</svg>
