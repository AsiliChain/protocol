    <!-- Smart contracts badge -->
    <rect x="30" y="170" width="140" height="18" rx="6" fill="oklch(97% 0.008 85)" stroke="#C8922A" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="100" y="183" text-anchor="middle" font-size="9" font-weight="700" fill="#4B2E0A">Smart Contracts · 7 modules</text>
